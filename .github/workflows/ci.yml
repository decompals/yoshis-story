name: Build

# Build on every branch push, tag push, and pull request change:
on:
  push:
  pull_request:

jobs:
  build_repo:
    # This is a *private* build container.
    container: ghcr.io/decompals/yoshis-story-build:main

    name: Build repo
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: [us]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install package requirements
      run: apt-get install -y make git build-essential binutils-mips-linux-gnu gcc-mips-linux-gnu python3 python3-pip python3-venv clang-format-14 clang-tidy-14

    - name: Get the dependency
      run: cp /orig/${{ matrix.version }}/baserom.z64 baseroms/${{ matrix.version }}/baserom.z64

    - name: venv
      run: make venv -j $(nproc) VERSION=${{ matrix.version }}

    - name: Setup
      run: make setup -j $(nproc) VERSION=${{ matrix.version }}

    # - name: Build libraries
    #   run: make lib -j $(nproc) VERSION=${{ matrix.version }}

    - name: Disassemble and extraction
      run: make extract -j $(nproc) VERSION=${{ matrix.version }}

    - name: Build Rom
      run: make -j $(nproc) WERROR=1 VERSION=${{ matrix.version }}

    - name: Upload frogress
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      run: .venv/bin/python3 tools/upload_frogress.py ${{ matrix.version }} --apikey ${{ secrets.PROGRESS_API_KEY }}
